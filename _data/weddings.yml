title: Tlaquepaque, one of Sedona's premier weddings and event destinations.
description: Specialized in intimate weddings and events, Tlaquepaque offers beauty and old world charm in the heart of Sedona. Vine covered stucco walls, cobblestone walkways, arched entryways and elegant plazas, provide you with a magical place to design the wedding of your dreams.
